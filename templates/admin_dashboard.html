<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <style>

        body{
            font-family:Arial;
            padding:20px;
            background:#f5f5f5;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:15px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:black;
            color:white;
        }

        tr:hover{
            background:#f1f1f1;
        }

    </style>

</head>

<body>

<h1>Contact Messages</h1>

<table>

    <tr>

        <th>Name</th>

        <th>Email</th>

        <th>Message</th>

        <th>Date</th>

    </tr>

    {% for i in contacts %}

    <tr>

        <td>{{i.name}}</td>

        <td>{{i.email}}</td>

        <td>{{i.message}}</td>

        <td>{{i.created_at}}</td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
