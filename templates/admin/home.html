<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Regional Technologies</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    :root{
      --bg:#06060a;
      --bg2:#0c0c12;
      --bg3:#111119;
      --card:#12121c;
      --card2:#1a1a27;
      --lime:#c8f135;
      --text:#f0f0f8;
      --text2:#8888a8;
      --border:rgba(255,255,255,.055);
      --danger:#ef4444;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',sans-serif;
    }

    .sidebar{
      width:260px;
      position:fixed;
      height:100vh;
      background:var(--card);
      border-right:1px solid var(--border);
      padding:20px 0;
    }

    .logo{
      padding:0 24px 20px;
      font-size:1.6rem;
      font-weight:800;
      font-family:'Plus Jakarta Sans',sans-serif;
      color:var(--lime);
      border-bottom:1px solid var(--border);
    }

    .nav-links{
      margin-top:30px;
    }

    .nav-link{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 24px;
      color:var(--text2);
      text-decoration:none;
      transition:.3s;
    }

    .nav-link:hover,
    .nav-link.active{
      background:rgba(200,241,53,.1);
      color:white;
      border-left:3px solid var(--lime);
    }

    .main-content{
      margin-left:260px;
      padding:20px;
    }

    .topbar{
      background:var(--card);
      padding:18px 25px;
      border-radius:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .search-box{
      background:var(--bg3);
      border:none;
      padding:12px 18px;
      border-radius:12px;
      width:320px;
      color:white;
      outline:none;
    }

    .btn-lime{
      background:var(--lime);
      color:#000;
      border:none;
      padding:10px 18px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-lime:hover{
      transform:translateY(-2px);
    }

    .dashboard-title{
      margin:30px 0 10px;
      font-size:2.4rem;
      font-weight:800;
      font-family:'Plus Jakarta Sans',sans-serif;
    }

    .subtitle{
      color:var(--text2);
      margin-bottom:25px;
    }

    .enquiries-wrapper{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
    }

    th,td{
      padding:16px;
      text-align:left;
      border-bottom:1px solid var(--border);
    }

    th{
      background:var(--bg2);
    }

    .status{
      background:#22c55e;
      color:white;
      padding:4px 12px;
      border-radius:20px;
      font-size:12px;
    }

    .delete-btn{
      background:#ef4444;
      color:white;
      border:none;
      padding:9px 14px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
    }

    .delete-btn:hover{
      background:#dc2626;
    }

    .loading,
    .no-data{
      text-align:center;
      padding:50px;
      color:var(--text2);
    }

    .time-display{
      color:var(--lime);
      font-weight:600;
    }

    @media(max-width:768px){

      .sidebar{
        display:none;
      }

      .main-content{
        margin-left:0;
      }

      table{
        display:block;
        overflow-x:auto;
      }

      .search-box{
        width:100%;
      }
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">
    Regional Tech
  </div>

  <div class="nav-links">

    <a href="#" class="nav-link active">
      <i class="fas fa-home"></i>
      Dashboard
    </a>

    <a href="/myapp/careerpage/" class="nav-link">
      <i class="fas fa-user-tie"></i>
      Careers
    </a>

  </div>

</div>

<!-- MAIN -->

<div class="main-content">

  <!-- TOPBAR -->

  <div class="topbar">

    <input type="text"
           class="search-box"
           id="searchInput"
           placeholder="Search enquiries...">

    <div style="display:flex;align-items:center;gap:18px;">

      <div class="time-display" id="current-time"></div>

      <button class="btn-lime" onclick="fetchEnquiries()">
        Refresh
      </button>

    </div>

  </div>

  <!-- TITLE -->

  <div class="dashboard-title">
    Dashboard
  </div>

  <div class="subtitle">
    Welcome back! Here's what's happening at Regional Technologies.
  </div>

  <!-- TABLE -->

  <div class="enquiries-wrapper">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">

      <h2 style="font-size:1.4rem;font-weight:700;">
        Recent Enquiries
      </h2>

    </div>

    <!-- LOADING -->

    <div id="loading" class="loading">
      <i class="fas fa-spinner fa-spin"></i>
      Loading enquiries...
    </div>

    <!-- TABLE -->

    <table id="enquiriesTable" style="display:none;">

      <thead>

      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Date</th>
        <th>Status</th>
        <th>Action</th>
      </tr>

      </thead>

      <tbody id="enquiriesBody"></tbody>

    </table>

    <!-- NO DATA -->

    <div id="no-data" class="no-data" style="display:none;">
      No enquiries found.
    </div>

  </div>

</div>

<script>

  /* CLOCK */

  function updateClock(){

    const now = new Date();

    const dateStr = now.toLocaleDateString('en-IN',{
      weekday:'long',
      month:'short',
      day:'numeric',
      year:'numeric'
    });

    const timeStr = now.toLocaleTimeString('en-US',{
      hour:'2-digit',
      minute:'2-digit',
      hour12:true
    });

    document.getElementById('current-time').textContent =
      `${dateStr} • ${timeStr}`;
  }

  setInterval(updateClock,1000);
  updateClock();

  /* FETCH ENQUIRIES */

  let allData = [];

  async function fetchEnquiries(){

    const loading = document.getElementById('loading');
    const table   = document.getElementById('enquiriesTable');
    const tbody   = document.getElementById('enquiriesBody');
    const noData  = document.getElementById('no-data');

    loading.style.display = 'block';
    table.style.display   = 'none';
    noData.style.display  = 'none';

    try{

      const response = await fetch('http://127.0.0.1:8000/myapp/contact_list/');

      if(!response.ok){
        throw new Error('Failed');
      }

      const data = await response.json();

      allData = data;

      renderTable(data);

    }
    catch(error){

      loading.innerHTML = `
        <span style="color:#ef4444;">
          Error loading enquiries
        </span>
      `;
    }
  }

  /* RENDER TABLE */

  function renderTable(data){

    const loading = document.getElementById('loading');
    const table   = document.getElementById('enquiriesTable');
    const tbody   = document.getElementById('enquiriesBody');
    const noData  = document.getElementById('no-data');

    tbody.innerHTML = '';

    if(data.length === 0){

      loading.style.display = 'none';
      table.style.display = 'none';
      noData.style.display = 'block';

      return;
    }

    data.forEach(item => {

      const date = new Date(item.created_at);

      tbody.innerHTML += `
      <tr>

        <td>
          <strong>${item.name}</strong>
        </td>

        <td>
          ${item.email}
        </td>

        <td>
          ${date.toLocaleDateString('en-IN')}
        </td>

        <td>
          <span class="status">
            New
          </span>
        </td>

        <td>

          <button class="delete-btn"
                  onclick="deleteEnquiry(${item.id})">

            <i class="fas fa-trash"></i>
            Delete

          </button>

        </td>

      </tr>
      `;
    });

    loading.style.display = 'none';
    table.style.display = 'table';
  }

  /* DELETE */

  async function deleteEnquiry(id){

    const confirmDelete = confirm(
      "Are you sure you want to delete this enquiry?"
    );

    if(!confirmDelete){
      return;
    }

    try{

      const response = await fetch(
        `/myapp/admin_delete_enquiry/${id}/`,
        {
          method:'GET'
        }
      );

      if(response.ok){

        fetchEnquiries();

      }else{

        alert('Failed to delete enquiry');

      }

    }
    catch(error){

      alert('Error deleting enquiry');

    }

  }

  /* SEARCH */

  document.getElementById('searchInput')
    .addEventListener('keyup', function(){

      const value = this.value.toLowerCase();

      const filtered = allData.filter(item =>

        item.name.toLowerCase().includes(value) ||
        item.email.toLowerCase().includes(value)

      );

      renderTable(filtered);

    });

  document.addEventListener('DOMContentLoaded', fetchEnquiries);

</script>

</body>
</html>
